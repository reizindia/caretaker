version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: caretaker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: caretaker_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caretaker_secret}
      POSTGRES_DB: caretaker_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caretaker_user -d caretaker_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: caretaker_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://caretaker_user:${POSTGRES_PASSWORD:-caretaker_secret}@postgres:5432/caretaker_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_REGION: ${STORAGE_REGION:-auto}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-caretaker}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN:-caretakerapp.com}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Caretaker}
    container_name: caretaker_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    name: caretaker_postgres_data
